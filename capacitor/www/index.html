<!doctype html>
<html lang="en" style="background: #0c0c0e">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>StrawVerse</title>
    <style>
      :root {
        --bg: #0c0c0e;
        --fg: #e8e8ea;
        --muted: #8a8a93;
        --accent: #e5484d;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 24px;
        text-align: center;
      }
      .logo {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .logo span {
        color: var(--accent);
      }
      .app-logo-img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 4px;
      }
      .loader-gif {
        width: 72px;
        height: 72px;
        object-fit: contain;
      }
      .status {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.5;
        max-width: 280px;
      }
      .error {
        color: var(--accent);
        font-size: 13px;
        line-height: 1.5;
        max-width: 300px;
        display: none;
      }
      button {
        display: none;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="nodejs/gui/dist/images/logo.webp" class="app-logo-img" alt="Logo" id="logo-img" onerror="this.style.display='none'" />
      <div class="logo">Straw<span>Verse</span></div>
      <img src="nodejs/gui/dist/images/loading.gif" class="loader-gif" alt="Loading" id="spinner" />
      <p class="status" id="status">Starting engine&hellip;</p>
      <p class="error" id="error"></p>
      <button id="retry" type="button">Retry</button>
    </main>
    <script src="loader.js" type="module"></script>
  </body>
</html>
